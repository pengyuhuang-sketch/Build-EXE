name: Build AutoGrader (Word/PDF Support)

on: [push]

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # 增加 python-docx 和 pdf2image
          pip install customtkinter pandas openpyxl easyocr pyinstaller torch torchvision python-docx pdf2image

      - name: Install Poppler (For PDF processing)
        shell: powershell
        run: |
          # 使用 choco 安裝 poppler，這是 pdf2image 必備的
          choco install poppler

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconsole --onedir --collect-all easyocr --collect-all torch --exclude-module PIL._avif --name "AutoGrader_v2" AutoGrader.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoGrader_Word_PDF
          path: dist/AutoGrader_v2/
