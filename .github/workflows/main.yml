name: Build EXE for AutoGrader

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4  # 升級到 v4

      - name: Set up Python
        uses: actions/setup-python@v5 # 升級到 v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter pandas openpyxl easyocr pyinstaller torch torchvision

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconsole --onefile --collect-all easyocr --collect-all torch --name "AutoGrader_v1" AutoGrader.py

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4  # 解決錯誤的關鍵：升級到 v4
        with:
          name: AutoGrader_Executable
          path: dist/AutoGrader_v1.exe
