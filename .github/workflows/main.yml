name: Build Cloud AutoGrader v2

on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # 加入 pandas 與 openpyxl 以支援 Excel 匯出
          pip install customtkinter python-docx google-generativeai pandas openpyxl pyinstaller Pillow

      - name: Build EXE
        run: |
          pyinstaller --noconsole --onefile --name "AutoGrader_v2" AutoGrader_v2.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: AutoGrader_Final_Version
          path: dist/AutoGrader_v2_Cloud.exe
